services:
    Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\DataTransformer\ContainerDataTransformerFactory:
        arguments:
            - '@service_container'

    Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\Similarity\ContainerSimilarityCheckerFactory:
        arguments:
            - '@service_container'

    Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\DataTransformer\DataTransformerFactoryInterface: '@Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\DataTransformer\ContainerDataTransformerFactory'
    Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\Similarity\SimilarityCheckerFactoryInterface: '@Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\Similarity\ContainerSimilarityCheckerFactory'

    Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\DuplicatesIndexWorker:
        arguments:
            - '@Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\DataTransformer\DataTransformerFactoryInterface'
            - '@doctrine.orm.entity_manager'
            - '@opendxp_element_manager.repository.duplicate'
            - '@opendxp_element_manager.repository.duplicate_object'
            - '@opendxp_element_manager.factory.duplicate'
            - '@opendxp_element_manager.factory.duplicate_object'

    Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\DuplicateFinder:
        arguments:
            - '@Instride\Bundle\OpenDxpElementManagerBundle\DuplicateIndex\Similarity\SimilarityCheckerFactoryInterface'
            - '@opendxp_element_manager.repository.duplicate'
            - '@opendxp_element_manager.repository.duplicate_object'
            - '@opendxp_element_manager.repository.potential_duplicate'
            - '@doctrine.orm.entity_manager'
            - '@opendxp_element_manager.factory.potential_duplicate'

    Instride\Bundle\OpenDxpElementManagerBundle\Metadata\DuplicatesIndex\MetadataRegistry:
        public: true
    Instride\Bundle\OpenDxpElementManagerBundle\Metadata\DuplicatesIndex\MetadataRegistryInterface:
        alias: 'Instride\Bundle\OpenDxpElementManagerBundle\Metadata\DuplicatesIndex\MetadataRegistry'
        public: true
